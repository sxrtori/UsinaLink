<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | Usinalink</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <a class="brand auth-brand" href="index.html">
      <span class="brand-icon" aria-hidden="true">US</span>
      <span>Usinalink</span>
    </a>
    <section class="card auth-card">
      <h1>Entrar na conta</h1>
      <p>Acesse sua &aacute;rea para acompanhar solicita&ccedil;&otilde;es e propostas.</p>
      <form class="form js-demo-form" data-redirect="dashboard-empresa.html" novalidate>
        <label class="field">
          <span>E-mail</span>
          <div class="input-icon"><span>@</span><input type="email" placeholder="voce@empresa.com.br" required></div>
        </label>
        <label class="field">
          <span>Senha</span>
          <div class="input-icon"><span>*</span><input type="password" placeholder="Digite sua senha" required></div>
        </label>
        <button class="btn full" type="submit">Entrar</button>
      </form>
      <a class="text-link centered" href="cadastro.html">Criar nova conta</a>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
