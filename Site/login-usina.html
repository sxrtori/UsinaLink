<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login de Usina | Usinalink</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page usina-auth">
  <main class="auth-shell">
    <a class="brand auth-brand" href="index.html">
      <span class="brand-icon orange-icon" aria-hidden="true">US</span>
      <span>Usinalink</span>
    </a>
    <section class="card auth-card usina-login-card">
      <span class="eyebrow orange-text">Acesso industrial</span>
      <h1>Entrar como usina</h1>
      <p>Acesse pedidos dispon&iacute;veis, envie propostas e acompanhe oportunidades.</p>
      <form class="form js-demo-form" data-redirect="dashboard-usina.html" novalidate>
        <label class="field">
          <span>E-mail industrial</span>
          <div class="input-icon orange-focus"><span>@</span><input type="email" placeholder="comercial@usina.com.br" required></div>
        </label>
        <label class="field">
          <span>Senha</span>
          <div class="input-icon orange-focus"><span>*</span><input type="password" placeholder="Digite sua senha" required></div>
        </label>
        <button class="btn btn-orange full" type="submit">Entrar como usina</button>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
