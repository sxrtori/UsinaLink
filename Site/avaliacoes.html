<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avalia&ccedil;&otilde;es | Usinalink</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-user-role="empresa">
  <div class="app-layout">
    <aside class="sidebar">
      <a class="brand" href="index.html"><span class="brand-icon">US</span><span>Usinalink</span></a>
      <nav class="side-nav" data-role-nav="empresa">
        <a href="dashboard-empresa.html" data-icon="D">Dashboard empresa</a>
        <a href="dashboard-pessoa-juridica.html" data-icon="P">Pe&ccedil;as comerciais</a>
        <a href="perfil-empresa.html" data-icon="I">Perfil</a>
        <a href="funcionarios.html" data-icon="F">Funcion&aacute;rios</a>
        <a href="solicitacoes.html" data-icon="S">Solicita&ccedil;&otilde;es</a>
        <a href="propostas.html" data-icon="R">Propostas recebidas</a>
        <a href="historico-pedidos.html" data-icon="H">Hist&oacute;rico de pedidos</a>
        <a class="active" href="avaliacoes.html" data-icon="A">Avalia&ccedil;&otilde;es</a>
        <a href="solicitacoes-bloqueio-usina.html" data-icon="B">Usinas bloqueadas</a>
        <a href="index.html" data-icon="X">Sair</a>
      </nav>
    </aside>
    <main class="app-main" data-company-reviews>
      <header class="page-header clean-header">
        <div><span class="eyebrow">Relacionamento</span><h1>Avalia&ccedil;&otilde;es realizadas</h1><p>Avalie usinas somente ap&oacute;s pedidos conclu&iacute;dos e acompanhe respostas recebidas.</p></div>
      </header>
      <section class="review-layout">
        <form class="card review-form" data-review-form hidden>
          <h2>Nova avalia&ccedil;&atilde;o</h2>
          <label class="field">Pedido conclu&iacute;do
            <span class="input-wrap select-field"><select name="pedidoId" data-review-order required></select></span>
          </label>
          <div class="rating-grid">
            <label class="field">Nota geral<span class="input-wrap select-field"><select name="notaGeral" required><option value="">Nota</option><option value="5">5 - Excelente</option><option value="4">4 - Bom</option><option value="3">3 - Regular</option><option value="2">2 - Ruim</option><option value="1">1 - Critico</option></select></span></label>
            <label class="field">Qualidade<span class="input-wrap select-field"><select name="qualidade" required><option value="">Nota</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></span></label>
            <label class="field">Prazo<span class="input-wrap select-field"><select name="prazo" required><option value="">Nota</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></span></label>
            <label class="field">Comunica&ccedil;&atilde;o<span class="input-wrap select-field"><select name="comunicacao" required><option value="">Nota</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></span></label>
          </div>
          <label class="field">Coment&aacute;rio opcional
            <textarea name="comentario" rows="4" placeholder="Conte como foi a experi&ecirc;ncia com qualidade, prazo e comunica&ccedil;&atilde;o."></textarea>
          </label>
          <button class="btn" type="submit">Enviar avalia&ccedil;&atilde;o</button>
        </form>
        <section class="review-list" data-review-list aria-live="polite"></section>
      </section>
    </main>
  </div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth-guard.js"></script>
  <script src="assets/js/ui-utils.js"></script>
  <script src="assets/js/reviews-blocks.js"></script>
  <script src="script.js"></script>
</body>
</html>
