<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicita&ccedil;&otilde;es de Bloqueio | Usinalink</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-user-role="empresa">
  <div class="app-layout">
    <aside class="sidebar">
      <a class="brand" href="index.html"><span class="brand-icon">US</span><span>Usinalink</span></a>
      <nav class="side-nav" data-role-nav="empresa">
        <a href="dashboard-empresa.html" data-icon="D">Dashboard empresa</a>
        <a href="dashboard-pessoa-juridica.html" data-icon="P">Pe&ccedil;as comerciais</a>
        <a href="perfil-empresa.html" data-icon="I">Perfil</a>
        <a href="funcionarios.html" data-icon="F">Funcion&aacute;rios</a>
        <a href="solicitacoes.html" data-icon="S">Solicita&ccedil;&otilde;es</a>
        <a href="propostas.html" data-icon="R">Propostas recebidas</a>
        <a href="historico-pedidos.html" data-icon="H">Hist&oacute;rico de pedidos</a>
        <a href="avaliacoes.html" data-icon="A">Avalia&ccedil;&otilde;es</a>
        <a class="active" href="solicitacoes-bloqueio-usina.html" data-icon="B">Usinas bloqueadas</a>
        <a href="index.html" data-icon="X">Sair</a>
      </nav>
    </aside>
    <main class="app-main">
      <header class="page-header clean-header">
        <div><span class="eyebrow">Modera&ccedil;&atilde;o</span><h1>Solicita&ccedil;&otilde;es de bloqueio</h1><p>Solicite an&aacute;lise da modera&ccedil;&atilde;o sem bloquear diretamente uma usina.</p></div>
      </header>
      <section class="review-layout">
        <form class="card review-form" data-block-form>
          <h2>Nova solicita&ccedil;&atilde;o</h2>
          <label class="field">Usina
            <span class="input-wrap select-field"><select name="usinaId" data-block-usina required></select></span>
          </label>
          <label class="field">Pedido relacionado
            <span class="input-wrap select-field"><select name="pedidoId" data-block-pedido><option value="">Sem pedido</option></select></span>
          </label>
          <label class="field">Motivo
            <span class="input-wrap select-field">
              <select name="motivo" required>
                <option value="Descumprimento de prazo">Descumprimento de prazo</option>
                <option value="Problema de qualidade">Problema de qualidade</option>
                <option value="Tentativa de fraude">Tentativa de fraude</option>
                <option value="Comunicacao inadequada">Comunica&ccedil;&atilde;o inadequada</option>
                <option value="Descumprimento comercial">Descumprimento comercial</option>
                <option value="Outro">Outro</option>
              </select>
            </span>
          </label>
          <label class="field">Descri&ccedil;&atilde;o
            <textarea name="descricao" rows="5" minlength="20" maxlength="1000" required placeholder="Explique o ocorrido com contexto suficiente para modera&ccedil;&atilde;o."></textarea>
          </label>
          <button class="btn" type="submit">Enviar solicita&ccedil;&atilde;o</button>
        </form>
        <section class="review-list" data-block-requests aria-live="polite"></section>
      </section>
    </main>
  </div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth-guard.js"></script>
  <script src="assets/js/ui-utils.js"></script>
  <script src="assets/js/reviews-blocks.js"></script>
  <script src="script.js"></script>
</body>
</html>
