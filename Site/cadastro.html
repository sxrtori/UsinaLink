<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Usinalink</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-shell">
  <main class="signup-page">
    <a class="brand brand-centered" href="index.html"><span class="brand-icon" aria-hidden="true">US</span><span>Usinalink</span></a>
    <section class="card signup-panel">
      <div class="panel-heading centered-block"><h1>Criar nova conta</h1><p>Selecione o tipo de usu&aacute;rio e preencha os dados</p></div>
      <div class="choice-grid" role="radiogroup" aria-label="Tipo de usuario">
        <label class="choice-card active" data-choice-card="empresa"><input type="radio" name="accountType" value="empresa" checked><span class="choice-check">OK</span><span class="choice-icon">EMP</span><strong>Empresa</strong><small>Compras e solicita&ccedil;&otilde;es</small></label>
        <label class="choice-card blue" data-choice-card="pessoa"><input type="radio" name="accountType" value="pessoa"><span class="choice-check">OK</span><span class="choice-icon">PF</span><strong>Pessoa F&iacute;sica</strong><small>Acompanhamento individual</small></label>
        <label class="choice-card orange" data-choice-card="usina"><input type="radio" name="accountType" value="usina"><span class="choice-check">OK</span><span class="choice-icon">USI</span><strong>Usina</strong><small>Or&ccedil;amentos industriais</small></label>
      </div>
      <form class="form-grid signup-dynamic-form js-demo-form" data-redirect="dashboard-empresa.html" novalidate>
        <label class="field"><span id="field-label-1">Nome da empresa</span><div class="input-wrap"><span class="input-symbol">EMP</span><input id="signup-field-1" type="text" placeholder="Metal Forte Ltda." required></div></label>
        <label class="field"><span id="field-label-2">CNPJ</span><div class="input-wrap"><span class="input-symbol">#</span><input id="signup-field-2" type="text" placeholder="00.000.000/0001-00" required></div></label>
        <label class="field"><span id="field-label-3">E-mail corporativo</span><div class="input-wrap"><span class="input-symbol">@</span><input id="signup-field-3" type="email" placeholder="compras@empresa.com" required></div></label>
        <label class="field"><span id="field-label-4">Nome do respons&aacute;vel</span><div class="input-wrap"><span class="input-symbol">N</span><input id="signup-field-4" type="text" placeholder="Nome e sobrenome" required></div></label>
        <label class="field"><span id="field-label-5">Cargo</span><div class="input-wrap"><span class="input-symbol">C</span><input id="signup-field-5" type="text" placeholder="Gerente de compras" required></div></label>
        <label class="field"><span id="field-label-6">Senha</span><div class="input-wrap"><span class="input-symbol">*</span><input id="signup-field-6" type="password" placeholder="Crie uma senha" required></div></label>
        <label class="field" hidden><span id="field-label-7">Confirmar senha</span><div class="input-wrap"><span class="input-symbol">*</span><input id="signup-field-7" type="password" placeholder="Digite a senha novamente"></div></label>
        <button class="btn btn-primary full" id="signup-submit" type="submit">Cadastrar empresa</button>
      </form>
      <a class="text-link centered" id="signup-login-link" href="login-empresa.html">J&aacute; tenho login</a>
    </section>
  </main>
  <script src="assets/js/api.js"></script>
  <script src="script.js"></script>
</body>
</html>
