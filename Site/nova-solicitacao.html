<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Solicita&ccedil;&atilde;o | Usinalink</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-user-role="empresa">
  <div class="app-layout">
    <aside class="sidebar">
      <a class="brand" href="index.html"><span class="brand-icon">US</span><span>Usinalink</span></a>
      <nav class="side-nav" data-role-nav="empresa">
        <a href="dashboard-empresa.html">Dashboard empresa</a>
        <a href="perfil-empresa.html">Perfil</a>
        <a href="funcionarios.html">Funcion&aacute;rios</a>
        <a class="active" href="solicitacoes.html">Solicita&ccedil;&otilde;es</a>
        <a href="propostas.html">Propostas</a>
        <a href="index.html">Sair</a>
      </nav>
    </aside>

    <main class="app-main">
      <div class="page-header">
        <div><span class="eyebrow">Compras industriais</span><h1>Nova solicita&ccedil;&atilde;o de pe&ccedil;a</h1></div>
      </div>
      <section class="card form-panel">
        <div class="panel-heading">
          <h2>Dados da solicita&ccedil;&atilde;o</h2>
          <p>Informe as especifica&ccedil;&otilde;es principais para receber propostas compar&aacute;veis.</p>
        </div>
        <form class="form-grid request-form js-demo-form" data-redirect="solicitacoes.html" novalidate>
          <label class="field"><span>Nome da pe&ccedil;a</span><div class="input-wrap"><span class="input-symbol">P</span><input type="text" placeholder="Ex.: Mancal de rolamento" required></div></label>
          <label class="field"><span>Categoria</span><div class="input-wrap select-field"><span class="input-symbol">C</span><select required><option>Usinagem</option><option>Fundi&ccedil;&atilde;o</option><option>Caldeiraria</option><option>Corte e dobra</option></select></div></label>
          <label class="field"><span>Material</span><div class="input-wrap"><span class="input-symbol">M</span><input type="text" placeholder="A&ccedil;o carbono SAE 1020"></div></label>
          <label class="field"><span>Quantidade</span><div class="input-wrap"><span class="input-symbol">#</span><input type="number" placeholder="100" min="1"></div></label>
          <label class="field"><span>Prazo desejado</span><div class="input-wrap"><span class="input-symbol">D</span><input type="date"></div></label>
          <label class="field"><span>Urg&ecirc;ncia</span><div class="input-wrap select-field"><span class="input-symbol">!</span><select><option>Normal</option><option>Alta</option><option>Cr&iacute;tica</option></select></div></label>
          <label class="field span-2"><span>Local de entrega</span><div class="input-wrap"><span class="input-symbol">L</span><input type="text" placeholder="Cidade, UF e endere&ccedil;o de entrega"></div></label>
          <label class="field span-2"><span>Descri&ccedil;&atilde;o t&eacute;cnica</span><textarea rows="5" placeholder="Detalhe medidas, toler&acirc;ncias, acabamento, normas e observa&ccedil;&otilde;es relevantes."></textarea></label>
          <label class="upload span-2"><input type="file"><span>UP</span><strong>Upload fict&iacute;cio de arquivo t&eacute;cnico</strong><small>PDF, DWG ou imagem t&eacute;cnica</small></label>
          <div class="form-actions span-2"><a class="btn btn-ghost" href="solicitacoes.html">Cancelar</a><button class="btn btn-primary" type="submit">Publicar solicita&ccedil;&atilde;o</button></div>
        </form>
      </section>
    </main>
  </div>
  <script src="assets/js/auth-guard.js"></script>
  <script src="script.js"></script>
</body>
</html>
